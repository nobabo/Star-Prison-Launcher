<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 320" role="img" aria-labelledby="title desc">
  <title id="title">Front-facing baby chicken</title>
  <desc id="desc">A blocky yellow baby chicken with wide black eyes, a large brown beak, small wings, and two legs.</desc>
  <style>
    :root {
      --feather: #d2bd27;
      --feather-gold: #d6a900;
      --chest: #bd7d08;
      --eye: #050505;
      --beak-light: #8a6941;
      --beak-dark: #6d4c2c;
      --leg-light: #795b39;
      --leg-dark: #6a4b2c;
      --foot: #24180f;
    }
  </style>
  <g transform="rotate(2 128 160)">
    <rect x="24" y="32" width="208" height="212" fill="var(--feather)" />
    <rect x="24" y="32" width="56" height="60" fill="var(--feather-gold)" />
    <rect x="168" y="32" width="64" height="60" fill="#deb000" />
    <rect x="24" y="92" width="52" height="56" fill="var(--eye)" />
    <rect x="180" y="92" width="52" height="56" fill="var(--eye)" />
    <rect x="76" y="140" width="52" height="60" fill="var(--beak-light)" />
    <rect x="128" y="140" width="52" height="60" fill="var(--beak-dark)" />
    <rect x="24" y="196" width="208" height="48" fill="var(--chest)" />
    <rect x="64" y="244" width="48" height="60" fill="var(--leg-light)" />
    <rect x="152" y="244" width="48" height="60" fill="var(--leg-light)" />
    <rect x="64" y="244" width="48" height="20" fill="var(--leg-dark)" />
    <rect x="152" y="244" width="48" height="20" fill="var(--leg-dark)" />
    <path d="M64 296H112V312H56Z" fill="var(--foot)" />
    <path d="M152 296H200L208 312H152Z" fill="var(--foot)" />
  </g>
</svg>
