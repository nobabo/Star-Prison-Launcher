<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Front-facing block chick face</title>
  <desc id="desc">A voxel-style yellow chick face with square black eyes and a brown block beak.</desc>

  <style>
    :root {
      --outline: #d98a00;
      --head: #ffd11a;
      --head-light: #ffdc2e;
      --head-mid: #ffc400;
      --head-shadow: #f0a800;
      --eye: #1f1b14;
      --beak-light: #bd7924;
      --beak: #a86216;
      --beak-shadow: #83450d;
      --lower: #ff9800;
      --lower-shadow: #e67f00;
    }

    .pixel {
      shape-rendering: crispEdges;
    }
  </style>

  <g class="pixel">
    <rect x="32" y="28" width="192" height="196" fill="var(--head)" />
    <rect x="32" y="28" width="192" height="196" fill="none" stroke="var(--outline)" stroke-width="8" />

    <rect x="40" y="36" width="56" height="42" fill="var(--head-light)" />
    <rect x="96" y="36" width="48" height="28" fill="var(--head-light)" />
    <rect x="144" y="36" width="64" height="42" fill="var(--head-mid)" />
    <rect x="48" y="78" width="40" height="36" fill="var(--head-mid)" opacity="0.55" />
    <rect x="128" y="68" width="48" height="54" fill="var(--head-shadow)" opacity="0.42" />
    <rect x="184" y="88" width="28" height="48" fill="var(--head-shadow)" opacity="0.32" />

    <rect x="32" y="176" width="192" height="48" fill="var(--lower)" />
    <rect x="128" y="176" width="96" height="48" fill="var(--lower-shadow)" opacity="0.38" />

    <rect x="48" y="74" width="44" height="44" fill="var(--eye)" />
    <rect x="164" y="74" width="44" height="44" fill="var(--eye)" />

    <rect x="82" y="124" width="92" height="44" fill="var(--beak)" />
    <rect x="82" y="124" width="46" height="44" fill="var(--beak-light)" />
    <rect x="128" y="124" width="46" height="44" fill="var(--beak)" />
    <rect x="96" y="168" width="64" height="20" fill="var(--beak-shadow)" />
  </g>
</svg>
