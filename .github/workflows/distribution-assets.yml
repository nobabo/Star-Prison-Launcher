name: Distribution Assets

on:
  pull_request:
    paths:
      - config/distribution.json
      - .github/scripts/verify-distribution-assets.mjs
      - .github/workflows/distribution-assets.yml
  push:
    branches:
      - main
    paths:
      - config/distribution.json
      - .github/scripts/verify-distribution-assets.mjs
      - .github/workflows/distribution-assets.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify distribution archives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24

      - run: node .github/scripts/verify-distribution-assets.mjs
